name: Publish to npm

# Publishes whenever you push a version tag (e.g. v0.1.3).
#
# Auth: npm **Trusted Publishing** (OIDC) — no NPM_TOKEN secret needed.
# One-time setup on npm: package → Settings → Trusted Publisher → GitHub Actions,
# and enter:
#   Repository:        escottalexander/request-wallet-sign
#   Workflow filename: publish.yml
#   Environment:       (leave blank — see note below)
#
# Provenance is generated automatically under trusted publishing, which is why
# the job needs `id-token: write`.
#
# Optional hardening: to require an approval gate before publishing, create a
# GitHub Environment (Settings → Environments), set the same name in npm's
# Trusted Publisher "Environment" field, and uncomment the `environment:` line
# in the job below.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    # environment: release   # uncomment AND set the same name in npm to gate publishes
    permissions:
      contents: read
      id-token: write   # required for npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing requires a recent npm (OIDC support landed in 11.5.1).
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Verify the tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG) does not match package.json version ($PKG)"
            exit 1
          fi

      - name: Run tests
        run: node --test

      - name: Publish to npm
        run: npm publish
