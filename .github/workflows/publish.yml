name: Publish to npm

# Publishes the package whenever you push a version tag (e.g. v0.1.3).
# Setup (one time): create an npm **Automation** access token (Account →
# Access Tokens → Generate → Automation — it bypasses 2FA, required for CI),
# then add it to the repo as a secret named NPM_TOKEN
# (Settings → Secrets and variables → Actions → New repository secret).

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # enables npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify the tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG) does not match package.json version ($PKG)"
            exit 1
          fi

      - name: Run tests
        run: node --test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
